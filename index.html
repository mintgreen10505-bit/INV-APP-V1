<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="庫存管家">
    <title>庫存管家</title>
    
    <link rel="icon" type="image/jpeg" href="icon.jpg?v=5">
    <link rel="apple-touch-icon" type="image/jpeg" href="icon.jpg?v=5">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-emerald-50/50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // 圖示轉換工具
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    lucide.createIcons({
                        attrs: { strokeWidth: 2 }
                    });
                }
            });
            return <i data-lucide={name} className={className} style={{width: size, height: size}}></i>;
        };

        const App = () => {
            const [inventory, setInventory] = useState([
                { id: 1, name: "示範商品 A", sku: "SKU-001", stock: 5, warningLevel: 10, image: null, updatedAt: new Date().toLocaleDateString() },
                { id: 2, name: "示範商品 B", sku: "SKU-002", stock: 25, warningLevel: 15, image: null, updatedAt: new Date().toLocaleDateString() }
            ]);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterLowStock, setFilterLowStock] = useState(false);
            const [notification, setNotification] = useState(null);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({ name: '', sku: '', stock: 0, warningLevel: 5, image: null });

            const showNotice = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            // 🌟 照片輕量化防崩潰魔法 🌟
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const tempImageUrl = URL.createObjectURL(file);
                    setFormData({ ...formData, image: tempImageUrl });
                    e.target.value = ''; 
                }
            };

            const openModal = (item = null) => {
                if (item) {
                    setEditingItem(item);
                    setFormData(item);
                } else {
                    setEditingItem(null);
                    setFormData({ name: '', sku: '', stock: 0, warningLevel: 5, image: null });
                }
                setIsModalOpen(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const updatedData = { ...formData, updatedAt: new Date().toLocaleDateString(), stock: Number(formData.stock), warningLevel: Number(formData.warningLevel) };
                if (editingItem) {
                    setInventory(inventory.map(item => item.id === editingItem.id ? { ...updatedData, id: item.id } : item));
                    showNotice("商品資料已更新");
                } else {
                    setInventory([...inventory, { ...updatedData, id: Date.now() }]);
                    showNotice("新商品已新增");
                }
                setIsModalOpen(false);
            };

            const confirmDelete = () => {
                if (deleteTarget) {
                    setInventory(inventory.filter(item => item.id !== deleteTarget.id));
                    showNotice(`已移除商品：${deleteTarget.name}`);
                    setDeleteTarget(null);
                }
            };

            const filteredInventory = useMemo(() => {
                return inventory.filter(item => {
                    const name = item.name || '';
                    const sku = item.sku || '';
                    const matchesSearch = name.toLowerCase().includes(searchTerm.toLowerCase()) || sku.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesFilter = filterLowStock ? item.stock <= item.warningLevel : true;
                    return matchesSearch && matchesFilter;
                });
            }, [inventory, searchTerm, filterLowStock]);

            const lowStockCount = inventory.filter(i => i.stock <= i.warningLevel).length;

            return (
                <div className="min-h-screen text-slate-900 font-sans">
                    <nav className="bg-white border-b border-emerald-100 sticky top-0 z-40 px-4 py-3 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-emerald-500 p-2 rounded-lg text-white">
                                <Icon name="package" />
                            </div>
                            <h1 className="font-black text-xl tracking-tight text-emerald-900">庫存管家</h1>
                        </div>
                        <button onClick={() => openModal()} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-full flex items-center gap-2 transition-all shadow-md active:scale-95 font-bold">
                            <Icon name="plus" /><span>新增商品</span>
                        </button>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 sm:p-8">
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-emerald-100">
                                <p className="text-emerald-600/70 text-sm mb-1 font-bold">總品項</p>
                                <p className="text-3xl font-black text-emerald-900">{inventory.length}</p>
                            </div>
                            <div className={`p-5 rounded-2xl shadow-sm border transition-all ${lowStockCount > 0 ? 'bg-red-50 border-red-200 animate-pulse' : 'bg-white border-emerald-100'}`}>
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className={`${lowStockCount > 0 ? 'text-red-700' : 'text-emerald-600/70'} text-sm mb-1 font-bold`}>庫存警示</p>
                                        <p className={`text-3xl font-black ${lowStockCount > 0 ? 'text-red-600'
