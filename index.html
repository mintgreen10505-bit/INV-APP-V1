    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // 🌟 修復白畫面的核心：讓圖示工人乖乖待在自己的包廂裡 🌟
        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: { strokeWidth: 2, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [inventory, setInventory] = useState([
                { id: 1, name: "示範商品 A", sku: "SKU-001", stock: 5, warningLevel: 10, image: null, updatedAt: new Date().toLocaleDateString() },
                { id: 2, name: "示範商品 B", sku: "SKU-002", stock: 25, warningLevel: 15, image: null, updatedAt: new Date().toLocaleDateString() }
            ]);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterLowStock, setFilterLowStock] = useState(false);
            const [notification, setNotification] = useState(null);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({ name: '', sku: '', stock: 0, warningLevel: 5, image: null });

            const showNotice = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const tempImageUrl = URL.createObjectURL(file);
                    setFormData({ ...formData, image: tempImageUrl });
                    e.target.value = ''; 
                }
            };

            const openModal = (item = null) => {
                if (item) {
                    setEditingItem(item);
                    setFormData(item);
                } else {
                    setEditingItem(null);
                    setFormData({ name: '', sku: '', stock: 0, warningLevel: 5, image: null });
                }
                setIsModalOpen(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const updatedData = { ...formData, updatedAt: new Date().toLocaleDateString(), stock: Number(formData.stock), warningLevel: Number(formData.warningLevel) };
                if (editingItem) {
                    setInventory(inventory.map(item => item.id === editingItem.id ? { ...updatedData, id: item.id } : item));
                    showNotice("商品資料已更新");
                } else {
                    setInventory([...inventory, { ...updatedData, id: Date.now() }]);
                    showNotice("新商品已新增");
                }
                setIsModalOpen(false);
            };

            const confirmDelete = () => {
                if (deleteTarget) {
                    setInventory(inventory.filter(item => item.id !== deleteTarget.id));
                    showNotice(`已移除商品：${deleteTarget.name}`);
                    setDeleteTarget(null);
                }
            };
