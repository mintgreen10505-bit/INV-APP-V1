<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="庫存管家">
    <title>庫存管家</title>
    
    <link rel="icon" type="image/jpeg" href="icon.jpg?v=10">
    <link rel="apple-touch-icon" type="image/jpeg" href="icon.jpg?v=10">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f0f9f6]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAwajTS9acHu-AS3Ic2f50eThVgo6XxLEM",
            authDomain: "mintgreen-app.firebaseapp.com",
            projectId: "mintgreen-app",
            storageBucket: "mintgreen-app.firebasestorage.app",
            messagingSenderId: "952421896550",
            appId: "1:952421896550:web:a8597a2727c9862e26f8a7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const Icon = ({ name, size = 20, className = "" }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: { strokeWidth: 2, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={spanRef} className="inline-flex items-center"></span>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [inventory, setInventory] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [formData, setFormData] = useState({ name: '', sku: '', stock: 0, warningLevel: 5 });
            const [searchTerm, setSearchTerm] = useState('');
            const [notification, setNotification] = useState(null);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                    if (u) loadData(u.uid);
                });
                return unsubscribe;
            }, []);

            const loadData = async (uid) => {
                const snapshot = await db.collection('inventory').doc(uid).collection('items').orderBy('updatedAt', 'desc').get();
                setInventory(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            };

            const handleLogin = () => auth.signInWithRedirect(provider);
            const handleLogout = () => auth.signOut();
            const showNotice = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.name || !formData.sku) return showNotice("請完整輸入內容喔！");

                const itemData = {
                    ...formData,
                    stock: Number(formData.stock),
                    warningLevel: Number(formData.warningLevel),
                    updatedAt: new Date().getTime() // 使用時間戳記排序更精準
                };

                const userItems = db.collection('inventory').doc(user.uid).collection('items');
                if (editingItem) {
                    await userItems.doc(editingItem.id).update(itemData);
                    showNotice("雲端更新成功！");
                } else {
                    await userItems.add(itemData);
                    showNotice("已存入雲端！");
                }
                setIsModalOpen(false);
                loadData(user.uid);
            };

            const deleteItem = async (id) => {
                if (confirm("確定刪除嗎？")) {
                    await db.collection('inventory').doc(user.uid).collection('items').doc(id).delete();
                    loadData(user.uid);
                    showNotice("已移除商品");
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-emerald-600 font-bold">連線中...</div>;

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 bg-white">
                        <div className="bg-emerald-500 w-20 h-20 rounded-3xl flex items-center justify-center mb-6 text-white shadow-xl">
                            <Icon name="package" size={40} />
                        </div>
                        <h1 className="text-3xl font-black text-emerald-900 mb-8">庫存管家</h1>
                        <button onClick={handleLogin} className="px-8 py-4 bg-white border-2 border-emerald-100 rounded-2xl flex items-center gap-3 font-bold shadow-sm active:scale-95">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"/>
                            透過 Google 登入
                        </button>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <nav className="glass-card border-b border-emerald-100 sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-emerald-500 p-2 rounded-lg text-white"><Icon name="package" size={20} /></div>
                            <span className="font-black text-emerald-900 text-lg">庫存同步中</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => { setEditingItem(null); setFormData({name:'', sku:'', stock:0, warningLevel:5}); setIsModalOpen(true); }} className="bg-emerald-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90"><Icon name="plus" /></button>
                            <img src={user.photoURL} onClick={handleLogout} className="w-9 h-9 rounded-full border-2 border-white shadow-sm" />
                        </div>
                    </nav>

                    <main className="p-5 max-w-2xl mx-auto space-y-4">
                        <div className="bg-white rounded-2xl p-3 flex items-center border border-emerald-50 shadow-sm">
                            <Icon name="search" className="ml-2 text-emerald-300" />
                            <input placeholder="搜尋品名或編號..." className="w-full p-2 bg-transparent outline-none font-bold text-sm" value={searchTerm} onChange={(e)=>setSearchTerm(e.target.value)} />
                        </div>

                        {inventory.filter(i => i.name.includes(searchTerm) || i.sku.includes(searchTerm)).map(item => (
                            <div key={item.id} className="bg-white p-5 rounded-[2rem] border border-emerald-50 shadow-sm relative overflow-hidden">
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="font-black text-slate-800 text-xl mb-1">{item.name}</h3>
                                        <span className="text-xs font-mono font-bold bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md">{item.sku}</span>
                                    </div>
                                    <div className="flex gap-1">
                                        <button onClick={()=>{setEditingItem(item); setFormData(item); setIsModalOpen(true);}} className="p-2 text-slate-300 hover:text-emerald-500"><Icon name="edit-3" size={18}/></button>
                                        <button onClick={()=>deleteItem(item.id)} className="p-2 text-slate-300 hover:text-red-400"><Icon name="trash-2" size={18}/></button>
                                    </div>
                                </div>
                                <div className="flex items-end justify-between">
                                    <div className="flex items-baseline gap-1">
                                        <span className={`text-4xl font-black ${item.stock <= item.warningLevel ? 'text-red-600 animate-pulse' : 'text-emerald-900'}`}>{item.stock}</span>
                                        <span className="text-[10px] text-slate-400 font-bold tracking-widest">目前存量</span>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] text-slate-400 font-bold">警示線 {item.warningLevel}</p>
                                    </div>
                                </div>
                                {item.stock <= item.warningLevel && <div className="absolute top-0 right-0 bg-red-500 text-white text-[9px] font-black px-4 py-1 rounded-bl-xl">庫存緊張</div>}
                            </div>
                        ))}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-emerald-950/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl animate-in zoom-in duration-200">
                                <h2 className="text-2xl font-black text-emerald-900 mb-8">{editingItem ? '修改品項' : '新增入庫'}</h2>
                                <div className="space-y-6">
                                    <div className="space-y-4">
                                        <div className="border-b-2 border-emerald-50 py-2">
                                            <label className="text-[10px] font-black text-emerald-400 uppercase">商品名稱</label>
                                            <input placeholder="輸入名稱..." className="w-full bg-transparent text-xl font-bold outline-none" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} />
                                        </div>
                                        <div className="border-b-2 border-emerald-50 py-2">
                                            <label className="text-[10px] font-black text-emerald-400 uppercase">SKU 編號</label>
                                            <input placeholder="SKU-XXXX" className="w-full bg-transparent text-xl font-mono outline-none" value={formData.sku} onChange={e=>setFormData({...formData, sku:e.target.value.toUpperCase()})} />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-emerald-50/50 p-4 rounded-3xl text-center">
                                            <label className="text-[10px] font-black text-emerald-700 block mb-1">當前數量</label>
                                            <input type="number" className="bg-transparent text-3xl font-black w-full text-center outline-none" value={formData.stock} onChange={e=>setFormData({...formData, stock:e.target.value})} />
                                        </div>
                                        <div className="bg-red-50/50 p-4 rounded-3xl text-center">
                                            <label className="text-[10px] font-black text-red-700 block mb-1">警報水位</label>
                                            <input type="number" className="bg-transparent text-3xl font-black w-full text-center outline-none" value={formData.warningLevel} onChange={e=>setFormData({...formData, warningLevel:e.target.value})} />
                                        </div>
                                    </div>
                                    <button onClick={handleSubmit} className="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all mt-4">同步儲存</button>
                                    <button onClick={()=>setIsModalOpen(false)} className="w-full py-2 text-slate-300 font-bold text-sm">取消</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl z-[100] animate-in slide-in-from-bottom font-bold text-sm">
                            {notification}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
