<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>庫存管家</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-[#f0f9f6]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 您的專屬 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyAwajTS9acHu-AS3Ic2f50eThVgo6XxLEM",
            authDomain: "mintgreen-app.firebaseapp.com",
            projectId: "mintgreen-app",
            storageBucket: "mintgreen-app.firebasestorage.app",
            messagingSenderId: "952421896550",
            appId: "1:952421896550:web:a8597a2727c9862e26f8a7"
        };

        // 初始化
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            const handleLogin = async () => {
                try {
                    setErrorMsg("正在喚起 Google 登入視窗...");
                    // 使用彈出視窗方式，這在手機 Chrome/Safari 較直觀
                    await auth.signInWithPopup(provider);
                } catch (error) {
                    console.error(error);
                    // 抓錯邏輯
                    if (error.code === 'auth/unauthorized-domain') {
                        setErrorMsg("❌ 錯誤：此網址未被授權。請到 Firebase 後台將您的 Vercel 網址加入『授權網域』。");
                    } else if (error.code === 'auth/popup-blocked') {
                        setErrorMsg("❌ 錯誤：登入視窗被瀏覽器攔截了，請允許彈出視窗。");
                    } else {
                        setErrorMsg(`❌ 登入失敗：${error.message}`);
                    }
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-emerald-600 font-bold text-xl text-center">正在連線至薄荷綠雲端...</div>;

            if (!user) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full border-4 border-emerald-50">
                            <h1 className="text-3xl font-black text-emerald-900 mb-2">庫存管家</h1>
                            <p className="text-slate-500 mb-8 font-medium text-sm text-center">歡迎回來，薄荷綠工作室！<br/>請登入以存取雲端資料庫。</p>
                            
                            <button 
                                onClick={handleLogin} 
                                className="w-full py-4 bg-emerald-600 text-white rounded-2xl flex items-center justify-center gap-3 font-bold hover:bg-emerald-700 transition-all shadow-lg active:scale-95"
                            >
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" className="bg-white rounded-full p-0.5"/>
                                透過 Google 登入
                            </button>

                            {errorMsg && (
                                <div className="mt-6 p-4 bg-red-50 text-red-600 text-xs rounded-xl border border-red-100 font-bold leading-relaxed text-left">
                                    {errorMsg}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 text-center">
                    <div className="bg-white p-8 rounded-[2rem] shadow-sm inline-block">
                        <img src={user.photoURL} className="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-emerald-100" />
                        <h2 className="text-2xl font-black text-emerald-900">登入成功！</h2>
                        <p className="text-slate-500 font-bold">{user.displayName}</p>
                        <button onClick={() => auth.signOut()} className="mt-6 text-slate-300 text-sm font-bold underline">登出帳號</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
