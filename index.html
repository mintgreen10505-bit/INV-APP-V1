        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

<body class="bg-emerald-50/50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // 簡易版 Lucide 圖示組件
        const Icon = ({ name, size = 20, className = "" }) => {
            const [iconSvg, setIconSvg] = useState("");
            useEffect(() => {
                if (window.lucide) {
                    const svg = lucide.createIcons({
                        icons: { [name]: {} },
                        attrs: { strokeWidth: 2, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} className={className} style={{width: size, height: size}}></i>;
        };

        const App = () => {
            const [inventory, setInventory] = useState([
                { id: 1, name: "示範商品 A", sku: "SKU-001", stock: 5, warningLevel: 10, image: null, updatedAt: new Date().toLocaleDateString() },
                { id: 2, name: "示範商品 B", sku: "SKU-002", stock: 25, warningLevel: 15, image: null, updatedAt: new Date().toLocaleDateString() }
            ]);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterLowStock, setFilterLowStock] = useState(false);
            const [notification, setNotification] = useState(null);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const fileInputRef = useRef(null);

            const [formData, setFormData] = useState({ name: '', sku: '', stock: 0, warningLevel: 5, image: null });

            const showNotice = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setFormData({ ...formData, image: reader.result });
                    reader.readAsDataURL(file);
                }
            };

            const openModal = (item = null) => {
                if (item) {
                    setEditingItem(item);
                    setFormData(item);
                } else {
                    setEditingItem(null);
                    setFormData({ name: '', sku: '', stock: 0, warningLevel: 5, image: null });
                }
                setIsModalOpen(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const updatedData = { ...formData, updatedAt: new Date().toLocaleDateString(), stock: Number(formData.stock), warningLevel: Number(formData.warningLevel) };
                if (editingItem) {
                    setInventory(inventory.map(item => item.id === editingItem.id ? { ...updatedData, id: item.id } : item));
                    showNotice("資料已更新");
                } else {
                    setInventory([...inventory, { ...updatedData, id: Date.now() }]);
                    showNotice("新商品已新增");
                }
                setIsModalOpen(false);
            };

            const filteredInventory = useMemo(() => {
                return inventory.filter(item => {
                    const matchesSearch = (item.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || (item.sku || '').toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesFilter = filterLowStock ? item.stock <= item.warningLevel : true;
                    return matchesSearch && matchesFilter;
                });
            }, [inventory, searchTerm, filterLowStock]);

            const lowStockCount = inventory.filter(i => i.stock <= i.warningLevel).length;

            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [filteredInventory, isModalOpen, deleteTarget]);

            return (
                <div className="min-h-screen text-slate-90
